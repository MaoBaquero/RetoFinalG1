name: "PROD DEPLOY — NetReady Grupo 1"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      environment: prod
      aws-assume-role-arn: "arn:aws:iam::573256070386:role/ROLIACGRupo1MB"
      aws-region: "us-east-1"
      aws-statefile-s3-bucket: "s3infoiacgrupo1mb"
      aws-lock-dynamodb-table: "bdinfoiacgrupo1mb"
